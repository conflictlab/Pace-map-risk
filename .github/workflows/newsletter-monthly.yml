name: Generate Monthly Newsletter

on:
  schedule:
    - cron: '0 2 24 * *' # 24th at 02:00 UTC
    - cron: '0 2 1 * *'  # 1st at 02:00 UTC
  workflow_dispatch: {}

jobs:
  newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies for PDF processing
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install PDF deps
        run: |
          python -m pip install --upgrade pip
          # Install numpy first to avoid version conflicts
          pip install 'numpy<2.0.0'
          if [ -f requirements_pdf.txt ]; then
            pip install -r requirements_pdf.txt
          else
            # Fix numpy/pandas compatibility issue by installing compatible versions
            pip install 'pandas>=1.4.0,<2.0.0' reportlab weasyprint geopandas matplotlib seaborn || true
          fi

      - name: Install image deps (matplotlib/seaborn)
        run: |
          pip install matplotlib seaborn

      - name: Build newsletter images from forecasts (aligned with dashboard)
        run: |
          # Try to fetch scenario/match pickles (optional)
          curl -fsSL https://raw.githubusercontent.com/conflictlab/Pace-map-risk/main/sce_dictionary.pkl -o sce_dictionary.pkl || true
          curl -fsSL https://raw.githubusercontent.com/conflictlab/Pace-map-risk/main/saved_dictionary.pkl -o saved_dictionary.pkl || true
          if [ -f scripts/newsletter_images_from_forecasts.py ]; then
            python scripts/newsletter_images_from_forecasts.py
          else
            echo "scripts/newsletter_images_from_forecasts.py not found" >&2; exit 1
          fi

      - name: Generate best.from_site.csv from forecasts
        run: |
          if [ -f scripts/generate_best_from_forecasts.py ]; then
            python scripts/generate_best_from_forecasts.py
          fi

      - name: Build newsletter PDF
        run: |
          ts=$(date -u +"%B %Y")
          out_name="Newsletter_${ts}.pdf"
          if [ -f pdf.py ]; then
            python pdf.py || true
          fi
          # If pdf.py didn't produce a file, fallback: convert HTML to placeholder PDF
          if [ ! -f "$out_name" ]; then
            python -c "from reportlab.lib.pagesizes import letter; from reportlab.pdfgen import canvas; from datetime import datetime; ts=datetime.utcnow().strftime('%B %Y'); fn=f\"Newsletter_{ts}.pdf\"; c=canvas.Canvas(fn,pagesize=letter); c.setFont('Helvetica',20); c.drawString(72,720,f\"PaCE Newsletter - {ts}\"); c.setFont('Helvetica',12); c.drawString(72,690,'Placeholder PDF generated by CI (update pdf.py for full content)'); c.showPage(); c.save(); print(fn)"
          fi
          ls -la Newsletter_*.pdf || true

      - name: Install HTML conversion deps
        run: |
          if [ -f requirements_html.txt ]; then
            pip install -r requirements_html.txt
          else
            pip install pdf2image || true
          fi

      - name: Build newsletter HTML
        run: |
          if [ -f newsletter.py ]; then
            echo "Converting Report.pdf to HTML..."
            python newsletter.py
            echo "HTML generated at assets/html_output/output.html"
          else
            echo "newsletter.py not found; skipping HTML generation" >&2
          fi

      - name: Commit newsletter artifacts
        run: |
          set -e
          ts=$(date -u +"%B %Y")
          out_name="Newsletter_${ts}.pdf"
          mkdir -p Newsletters
          if ls Newsletter_*.pdf >/dev/null 2>&1; then
            mv Newsletter_*.pdf Newsletters/ || true
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          # Stage all changes produced by this job to avoid unstaged files during rebase
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore(newsletter): publish $ts newsletter (PDF/HTML)"
          else
            echo "No newsletter changes to commit"
          fi
          # Configure merge drivers so generated binaries auto-resolve during rebase
          if [ -f scripts/ci-merge-driver-setup.sh ]; then
            bash scripts/ci-merge-driver-setup.sh || true
          else
            git config merge.keepTheirs.name "Keep theirs (rebased commit)"
            git config merge.keepTheirs.driver 'sh -c '\''cat "$3" > "$2"'\'' _ || true
          fi
          # Rebase on latest main to avoid non-fast-forward push failures; autostash local mods
          git fetch origin main
          git config rebase.autoStash true
          if ! git pull --rebase origin main; then
            echo "Rebase failed; attempting auto-resolve for newsletter artifacts" >&2
            if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
              # Prefer rebased commit's version for generated files
              for f in $(git diff --name-only --diff-filter=U); do
                case "$f" in
                  Newsletters/*.pdf|assets/Report.pdf|assets/html_output/_pdf_images/*)
                    git checkout --theirs -- "$f" || true ;;
                  *) ;;
                esac
              done
              git add -A
              if ! git rebase --continue; then
                echo "Rebase continue failed; aborting" >&2
                git rebase --abort || true
                exit 1
              fi
            else
              echo "Not in rebase state; aborting" >&2
              exit 1
            fi
          fi
          git push origin HEAD:main

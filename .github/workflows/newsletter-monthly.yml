name: Generate Monthly Newsletter

on:
  schedule:
    - cron: '0 2 24 * *' # 24th at 02:00 UTC
    - cron: '0 2 1 * *'  # 1st at 02:00 UTC
  workflow_dispatch: {}

jobs:
  newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install newsletter HTML deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_html.txt ]; then
            pip install -r requirements_html.txt
          else
            pip install jinja2 markdown reportlab || true
          fi

      - name: Build newsletter HTML
        run: |
          if [ -f newsletter.py ]; then
            python newsletter.py
          else
            echo "newsletter.py not found; skipping HTML generation" >&2
          fi

      - name: Install PDF deps
        run: |
          if [ -f requirements_pdf.txt ]; then
            pip install -r requirements_pdf.txt
          else
            pip install reportlab weasyprint || true
          fi

      - name: Build newsletter PDF
        run: |
          ts=$(date -u +"%B %Y")
          out_name="Newsletter_${ts}.pdf"
          if [ -f pdf.py ]; then
            python pdf.py || true
          fi
          # If pdf.py didn't produce a file, fallback: convert HTML to placeholder PDF
          if [ ! -f "$out_name" ]; then
            echo "PaCE Newsletter - $ts" > title.txt
            python - <<'PY'
import sys
from reportlab.lib.pagesizes import letter
from reportlab.pdfgen import canvas
from datetime import datetime
ts = datetime.utcnow().strftime('%B %Y')
fn = f"Newsletter_{ts}.pdf"
c = canvas.Canvas(fn, pagesize=letter)
c.setFont("Helvetica", 20)
c.drawString(72, 720, f"PaCE Newsletter - {ts}")
c.setFont("Helvetica", 12)
c.drawString(72, 690, "Placeholder PDF generated by CI (update pdf.py for full content)")
c.showPage(); c.save()
print(fn)
PY
          fi
          ls -la Newsletter_*.pdf || true

      - name: Commit newsletter artifacts
        run: |
          set -e
          ts=$(date -u +"%B %Y")
          out_name="Newsletter_${ts}.pdf"
          mkdir -p Newsletters
          if ls Newsletter_*.pdf >/dev/null 2>&1; then
            mv Newsletter_*.pdf Newsletters/ || true
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add Newsletters/ *.html *.png || true
          if git diff --cached --quiet; then
            echo "No newsletter changes to commit"
          else
            git commit -m "chore(newsletter): publish $ts newsletter (PDF/HTML)"
            git push
          fi

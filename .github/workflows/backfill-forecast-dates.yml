name: Backfill Forecast Dates (add YYYY-MM column)

on:
  workflow_dispatch: {}

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas python-dateutil

      - name: Add date column to existing forecasts
        run: |
          python scripts/add_date_to_forecasts.py

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add forecasts_h*.csv forecasts_h12*.csv Pred_df*.csv forecast_metadata.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): add 'date' column (YYYY-MM) to forecast CSVs"
          git push


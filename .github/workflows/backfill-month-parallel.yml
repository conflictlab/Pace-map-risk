name: Backfill Month(s) (parallel)

on:
  workflow_dispatch:
    inputs:
      asof:
        description: "Single month (YYYY-MM). Ignored if range/list provided."
        required: false
        default: ""
      fromMonth:
        description: "Start month (YYYY-MM)"
        required: false
        default: ""
      toMonth:
        description: "End month (YYYY-MM)"
        required: false
        default: ""
      months:
        description: "Comma-separated months (YYYY-MM,YYYY-MM,...)"
        required: false
        default: ""
      skipExistingH12:
        description: "Skip months that already have h12 in Historical_Predictions"
        required: false
        type: boolean
        default: true

jobs:
  resolve-months:
    runs-on: ubuntu-latest
    outputs:
      months: ${{ steps.set.outputs.months }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set
        name: Resolve month list
        shell: bash
        run: |
          set -euo pipefail
          fm='${{ inputs.fromMonth }}'
          tm='${{ inputs.toMonth }}'
          list='${{ inputs.months }}'
          as='${{ inputs.asof }}'
          skip='${{ inputs.skipExistingH12 }}'
          inc_month() { y=${1%-*}; m=${1#*-}; m=$((10#$m+1)); y=$((10#$y + (m>12?1:0))); m=$(( (m-1)%12 + 1 )); printf '%04d-%02d' "$y" "$m"; }
          build_range() { local a="$1"; local b="$2"; local cur="$a"; local out=(); while :; do out+=("$cur"); [ "$cur" = "$b" ] && break; cur=$(inc_month "$cur"); done; printf '%s\n' "${out[@]}"; }
          # Build a space-separated list of months (no JSON yet)
          list_ss=""
          if [ -n "$list" ]; then
            IFS=',' read -ra arr <<<"$list"; for m in "${arr[@]}"; do m=$(echo "$m"|tr -d ' '); [ -n "$m" ] && list_ss+=" $m"; done
          elif [ -n "$fm" ] && [ -n "$tm" ]; then
            while read -r m; do list_ss+=" $m"; done < <(build_range "$fm" "$tm")
          elif [ -n "$as" ]; then
            list_ss=" $as"
          else
            echo "::warning::No months specified; defaulting to current month"
            list_ss=" $(date -u +%Y-%m)"
          fi
          # Optionally filter out months that already have h12
          filtered_ss=""
          for m in $list_ss; do
            if [ "$skip" = "true" ] && ls Historical_Predictions 2>/dev/null | grep -Eq "^${m}(_|\\.).*h12\\.csv$"; then
              echo "Skipping $m (h12 exists)"
              continue
            fi
            filtered_ss+=" $m"
          done
          # Convert to JSON array; ensure non-empty JSON
          if [ -z "$filtered_ss" ]; then
            months_json='[]'
          else
            months_json='["'"$(echo "$filtered_ss" | sed -e 's/^ *//' -e 's/  */","/g')"'"]'
          fi
          echo "Resolved months: $months_json"
          echo "months=$months_json" >> "$GITHUB_OUTPUT"

  prepare-data:
    needs: resolve-months
    runs-on: ubuntu-latest
    env:
      ASOF: ${{ matrix.month }}
      UCDP_API_TOKEN: ${{ secrets.UCDP_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        month: ${{ fromJSON(needs.resolve-months.outputs.months) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install seaborn scikit-learn

      - name: Download and process UCDP data (as of ${{ inputs.asof }})
        run: python scripts/parallel/prepare_data.py

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ matrix.month }}
          path: |
            Conf.csv
            reg_coun.csv
            shape.py
            generate_forecasts.py
          retention-days: 1

  generate-h6:
    needs: prepare-data
    runs-on: ubuntu-latest
    env:
      ASOF: ${{ matrix.month }}
    strategy:
      matrix:
        month: ${{ fromJSON(needs.resolve-months.outputs.months) }}
        chunk: [0, 1, 2, 3]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install seaborn scikit-learn

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data-${{ matrix.month }}
          path: ./

      - name: Generate h=6 forecasts (chunk ${{ matrix.chunk }})
        run: python scripts/parallel/generate_chunk.py 6 ${{ matrix.chunk }} 4
        timeout-minutes: 90

      - name: Upload h6 results
        uses: actions/upload-artifact@v4
        with:
          name: h6-chunk-${{ matrix.month }}-${{ matrix.chunk }}
          path: |
            forecasts_h6_chunk${{ matrix.chunk }}.csv
            forecasts_h6_min_chunk${{ matrix.chunk }}.csv
            forecasts_h6_max_chunk${{ matrix.chunk }}.csv
            perc_h6_chunk${{ matrix.chunk }}.csv
            dict_m_h6_chunk${{ matrix.chunk }}.pkl
            dict_sce_h6_chunk${{ matrix.chunk }}.pkl
            sce_dictionary_h6_chunk${{ matrix.chunk }}.pkl
          retention-days: 1

  generate-h12:
    needs: prepare-data
    runs-on: ubuntu-latest
    env:
      ASOF: ${{ matrix.month }}
    strategy:
      matrix:
        month: ${{ fromJSON(needs.resolve-months.outputs.months) }}
        chunk: [0, 1, 2, 3]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install seaborn scikit-learn

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data-${{ matrix.month }}
          path: ./

      - name: Generate h=12 forecasts (chunk ${{ matrix.chunk }})
        run: python scripts/parallel/generate_chunk.py 12 ${{ matrix.chunk }} 4
        timeout-minutes: 90

      - name: Upload h12 results
        uses: actions/upload-artifact@v4
        with:
          name: h12-chunk-${{ matrix.month }}-${{ matrix.chunk }}
          path: |
            forecasts_h12_chunk${{ matrix.chunk }}.csv
            forecasts_h12_min_chunk${{ matrix.chunk }}.csv
            forecasts_h12_max_chunk${{ matrix.chunk }}.csv
            perc_h12_chunk${{ matrix.chunk }}.csv
            dict_sce_h12_chunk${{ matrix.chunk }}.pkl
            sce_dictionary_h12_chunk${{ matrix.chunk }}.pkl
          retention-days: 1

  merge-and-archive:
    needs: [generate-h6, generate-h12]
    runs-on: ubuntu-latest
    concurrency:
      group: backfill-archive
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      ASOF: ${{ matrix.month }}
    strategy:
      fail-fast: false
      matrix:
        month: ${{ fromJSON(needs.resolve-months.outputs.months) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas==1.4.0 numpy==1.22.3 python-dateutil

      - name: Download h6 chunks
        uses: actions/download-artifact@v4
        with:
          pattern: h6-chunk-${{ matrix.month }}-*
          path: h6-chunks/
          merge-multiple: true

      - name: Download h12 chunks
        uses: actions/download-artifact@v4
        with:
          pattern: h12-chunk-${{ matrix.month }}-*
          path: h12-chunks/
          merge-multiple: true

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data-${{ matrix.month }}
          path: data/

      - name: Merge h=6 results
        run: python scripts/parallel/merge_results.py 6 4

      - name: Merge h=12 results
        run: python scripts/parallel/merge_results.py 12 4

      - name: Create Hist.csv and metadata
        run: python scripts/parallel/create_metadata.py

      - name: Add 'date' (YYYY-MM) column to forecast CSVs
        run: |
          python - <<'PY'
          import pandas as pd, json
          from datetime import datetime
          try:
              with open('forecast_metadata.json') as f:
                  meta=json.load(f)
              start=datetime.strptime((meta.get('forecast_start_date') or meta.get('data_end_date'))+'-01','%Y-%m-%d')
          except Exception:
              from datetime import datetime as dt
              start=dt.utcnow().replace(day=1)
          def yyyymm_add(d,i):
              y=d.year; m=d.month+i
              y+= (m-1)//12; m=((m-1)%12)+1
              return f"{y:04d}-{m:02d}"
          def ensure(fname):
              try: df=pd.read_csv(fname)
              except: return
              if len(df.columns)>0 and str(df.columns[0]).lower()=='date': return
              dates=[yyyymm_add(start,i) for i in range(len(df))]
              df.insert(0,'date',dates)
              df.to_csv(fname,index=False)
          for f in ['forecasts_h6.csv','forecasts_h6_min.csv','forecasts_h6_max.csv','forecasts_h12.csv','forecasts_h12_min.csv','forecasts_h12_max.csv','Pred_df.csv','Pred_df_min.csv','Pred_df_max.csv']:
              ensure(f)
          PY

      - name: Archive snapshots under Historical_Predictions
        run: python scripts/prepare_historical_predictions.py

      - name: Commit and push archive
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          # First rebase on latest main to avoid non-fast-forward
          git fetch origin main
          if ! git pull --rebase origin main; then
            echo "Rebase failed; attempting stash/pull sequence"
            git stash --all || true
            git pull --rebase origin main || true
            git stash pop || true
          fi
          git add -A Historical_Predictions || true
          if git diff --cached --quiet; then
            echo "No archived changes to commit"
            exit 0
          fi
          git commit -m "chore(archive): add ${{ matrix.month }} h6/h12 snapshots to Historical_Predictions (parallel backfill)"
          # Try push; if rejected, rebase again and retry
          if ! git push origin HEAD:main; then
            git fetch origin main
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi

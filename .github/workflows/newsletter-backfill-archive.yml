name: Newsletter Backfill (archive-only)

# Manual dispatch for archive-only newsletter generation
on:
  workflow_dispatch:
    inputs:
      period:
        description: Forecast start period (YYYY-MM)
        required: true

jobs:
  backfill:
    concurrency:
      group: newsletter-backfill-archive
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (latest main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install 'numpy<2.0.0' 'pandas>=1.4.0,<2.0.0' matplotlib seaborn reportlab dtaidistance scipy geopandas || true

      - name: Stage archived forecasts for ${{ inputs.period }}
        run: |
          set -euo pipefail
          period='${{ inputs.period }}'
          h6="Historical_Predictions/${period}_h6.csv"
          hist="Historical_Predictions/${period}_Hist.csv"
          test -f "$h6" || { echo "Missing archived $h6" >&2; exit 1; }
          cp -f "$h6" forecasts_h6.csv
          [ -f "Historical_Predictions/${period}_h6_min.csv" ] && cp -f "Historical_Predictions/${period}_h6_min.csv" forecasts_h6_min.csv || true
          [ -f "Historical_Predictions/${period}_h6_max.csv" ] && cp -f "Historical_Predictions/${period}_h6_max.csv" forecasts_h6_max.csv || true
          if [ -f "$hist" ]; then cp -f "$hist" Hist.csv; fi

      - name: Derive best.from_site.csv
        run: |
          python scripts/generate_best_from_forecasts.py

      - name: Build newsletter images from forecasts
        run: |
          if [ -f scripts/newsletter_images_thomas.py ]; then
            python scripts/newsletter_images_thomas.py
          else
            python scripts/newsletter_images_from_forecasts.py
          fi

      - name: Build newsletter PDF
        run: |
          ts=$(date -u -d "${{ inputs.period }}-01" +"%B %Y" 2>/dev/null || date -u +"%B %Y")
          if [ -f pdf.py ]; then
            python pdf.py || true
          fi
          if ! ls Newsletter_*.pdf >/dev/null 2>&1; then
            # Fallback placeholder
            python - <<'PY'
from reportlab.lib.pagesizes import letter
from reportlab.pdfgen import canvas
from datetime import datetime
ts=datetime.utcnow().strftime('%B %Y')
fn=f'Newsletter_{ts}.pdf'
c=canvas.Canvas(fn,pagesize=letter)
c.setFont('Helvetica',20)
c.drawString(72,720,f'PaCE Newsletter - {ts}')
c.setFont('Helvetica',12)
c.drawString(72,690,'Placeholder PDF (pdf.py failed)')
c.showPage(); c.save(); print(fn)
PY
          fi
          ls -la Newsletter_*.pdf || true

      - name: Commit newsletter artifacts
        run: |
          set -e
          ts=$(date -u -d "${{ inputs.period }}-01" +"%B %Y" 2>/dev/null || date -u +"%B %Y")
          mkdir -p Newsletters
          if ls Newsletter_*.pdf >/dev/null 2>&1; then
            mv Newsletter_*.pdf Newsletters/ || true
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add Newsletters/ assets/ Images/ docs/Images/ || true
          if git diff --cached --quiet; then
            echo "No newsletter changes to commit"
          else
            git commit -m "chore(newsletter): backfill (archive-only) ${{ inputs.period }}"
            git push
          fi

name: Generate Monthly Forecasts (Parallel)

on:
  schedule:
    - cron: '0 1 1 * *'  # 1st of every month at 1:00 AM UTC (before website sync at 3 AM)
  workflow_dispatch:  # Allow manual triggering

jobs:
  prepare-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy geopandas matplotlib seaborn shapely scipy scikit-learn
          pip install -r requirements.txt || true

      - name: Download and process UCDP data
        run: python scripts/parallel/prepare_data.py

      - name: Save processed data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: |
            Conf.csv
            reg_coun.csv
            shape.py
            generate_forecasts.py
          retention-days: 1

  generate-h6:
    needs: prepare-data
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy geopandas matplotlib seaborn shapely scipy scikit-learn
          pip install -r requirements.txt || true

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: ./

      - name: Generate h=6 forecasts for chunk ${{ matrix.chunk }}
        run: python scripts/parallel/generate_chunk.py 6 ${{ matrix.chunk }} 4
        timeout-minutes: 90

      - name: Upload h6 chunk results
        uses: actions/upload-artifact@v4
        with:
          name: h6-chunk-${{ matrix.chunk }}
          path: |
            forecasts_h6_chunk${{ matrix.chunk }}.csv
            forecasts_h6_min_chunk${{ matrix.chunk }}.csv
            forecasts_h6_max_chunk${{ matrix.chunk }}.csv
            perc_h6_chunk${{ matrix.chunk }}.csv
            dict_m_h6_chunk${{ matrix.chunk }}.pkl
            dict_sce_h6_chunk${{ matrix.chunk }}.pkl
            sce_dictionary_h6_chunk${{ matrix.chunk }}.pkl
          retention-days: 1

  generate-h12:
    needs: prepare-data
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy geopandas matplotlib seaborn shapely scipy scikit-learn
          pip install -r requirements.txt || true

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: ./

      - name: Generate h=12 forecasts for chunk ${{ matrix.chunk }}
        run: python scripts/parallel/generate_chunk.py 12 ${{ matrix.chunk }} 4
        timeout-minutes: 90

      - name: Upload h12 chunk results
        uses: actions/upload-artifact@v4
        with:
          name: h12-chunk-${{ matrix.chunk }}
          path: |
            forecasts_h12_chunk${{ matrix.chunk }}.csv
            forecasts_h12_min_chunk${{ matrix.chunk }}.csv
            forecasts_h12_max_chunk${{ matrix.chunk }}.csv
            perc_h12_chunk${{ matrix.chunk }}.csv
            dict_sce_h12_chunk${{ matrix.chunk }}.pkl
            sce_dictionary_h12_chunk${{ matrix.chunk }}.pkl
          retention-days: 1

  merge-and-publish:
    needs: [generate-h6, generate-h12]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Download all h6 chunks
        uses: actions/download-artifact@v4
        with:
          pattern: h6-chunk-*
          path: h6-chunks/
          merge-multiple: true

      - name: Download all h12 chunks
        uses: actions/download-artifact@v4
        with:
          pattern: h12-chunk-*
          path: h12-chunks/
          merge-multiple: true

      - name: Download processed data for Hist.csv
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/

      - name: Merge h=6 results
        run: python scripts/parallel/merge_results.py 6 4

      - name: Merge h=12 results
        run: python scripts/parallel/merge_results.py 12 4

      - name: Create Hist.csv and metadata
        run: python scripts/parallel/create_metadata.py

      - name: Create scenario CSV files (for backward compatibility)
        run: |
          # Read the h=6 results and create dec.csv, sta.csv, inc.csv
          # These are needed for the website
          python -c "
import pandas as pd
import pickle

# These files are created by the original generate_forecasts.py
# For now, we'll create empty placeholders since the parallel version
# doesn't generate df_next[0,1,2] - this would need to be added
# to the parallel chunks if needed

print('Note: dec.csv, sta.csv, inc.csv not generated in parallel mode')
print('Website should use forecasts_h6.csv instead')
          "

      - name: Organize outputs for Historical_Predictions
        run: python scripts/prepare_historical_predictions.py || echo "Script not found, skipping"
        timeout-minutes: 10

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add \
            forecasts_h6.csv forecasts_h6_min.csv forecasts_h6_max.csv \
            forecasts_h12.csv forecasts_h12_min.csv forecasts_h12_max.csv \
            Hist.csv forecast_metadata.json \
            Pred_df.csv Pred_df_min.csv Pred_df_max.csv \
            perc.csv \
            saved_dictionary.pkl dict_sce.pkl sce_dictionary.pkl \
            dict_sce_h12.pkl sce_dictionary_h12.pkl \
            Historical_Predictions/ || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: generate monthly forecasts for $(date +%Y-%m) (parallel)

          - Generated h=6 and h=12 month forecasts using parallel execution
          - Processed with 4 workers per horizon (8 total parallel jobs)
          - Updated historical data through $(date +%Y-%m)

          🤖 Generated with GitHub Actions (parallel workflow)"

            git push
          fi

      - name: Upload forecast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forecasts-${{ github.run_number }}
          path: |
            forecasts_h6.csv
            forecasts_h6_min.csv
            forecasts_h6_max.csv
            forecasts_h12.csv
            forecasts_h12_min.csv
            forecasts_h12_max.csv
            Hist.csv
            forecast_metadata.json
          retention-days: 90

      - name: Create summary
        run: |
          echo "## 📊 Parallel Forecast Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Generated forecasts for $(date +%Y-%m)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Parallelization" >> $GITHUB_STEP_SUMMARY
          echo "- Used 4 parallel workers per horizon (h=6 and h=12)" >> $GITHUB_STEP_SUMMARY
          echo "- Total: 8 parallel jobs running simultaneously" >> $GITHUB_STEP_SUMMARY
          echo "- Expected runtime: ~1-1.5 hours (vs 5-6 hours sequential)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output Files" >> $GITHUB_STEP_SUMMARY
          echo "- 6-month forecasts: \`forecasts_h6.csv\`, \`forecasts_h6_min.csv\`, \`forecasts_h6_max.csv\`" >> $GITHUB_STEP_SUMMARY
          echo "- 12-month forecasts: \`forecasts_h12.csv\`, \`forecasts_h12_min.csv\`, \`forecasts_h12_max.csv\`" >> $GITHUB_STEP_SUMMARY
          echo "- Historical data: \`Hist.csv\`" >> $GITHUB_STEP_SUMMARY
          echo "- Metadata: \`forecast_metadata.json\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Website will sync these files via sync-forecasts.yml (runs daily at 3 AM UTC)" >> $GITHUB_STEP_SUMMARY
          echo "- Files available at: https://raw.githubusercontent.com/conflictlab/Pace-map-risk/main/" >> $GITHUB_STEP_SUMMARY

name: Newsletter Backfill (by period)

# Manual dispatch for archive-only newsletter generation
on:
  workflow_dispatch:
    inputs:
      period:
        description: Forecast start period (YYYY-MM)
        required: true
      titleSource:
        description: Title by 'archive' (default) or 'forecast'
        required: false
        default: 'archive'

jobs:
  backfill:
    concurrency:
      group: newsletter-backfill
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (latest main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-path from archive if available
        id: fastpath
        run: |
          set -euo pipefail
          period="${{ inputs.period }}"
          used=false
          # If archived snapshots for the period exist, use them directly
          if [ -f "Historical_Predictions/${period}_h6.csv" ]; then
            cp -f "Historical_Predictions/${period}_h6.csv" forecasts_h6.csv
            # Optionally copy min/max if present
            [ -f "Historical_Predictions/${period}_h6_min.csv" ] && cp -f "Historical_Predictions/${period}_h6_min.csv" forecasts_h6_min.csv || true
            [ -f "Historical_Predictions/${period}_h6_max.csv" ] && cp -f "Historical_Predictions/${period}_h6_max.csv" forecasts_h6_max.csv || true
            # Hist snapshot (if present)
            if [ -f "Historical_Predictions/${period}_Hist.csv" ]; then
              cp -f "Historical_Predictions/${period}_Hist.csv" Hist.csv
            fi
            # Write minimal metadata so downstream steps work
            python - <<'PY'
import json, os
from datetime import datetime
p=os.environ.get('PERIOD') or '${{ inputs.period }}'
meta={
  'run_date': datetime.utcnow().isoformat(),
  'data_end_date': p,
  'forecast_start_date': p,
}
open('forecast_metadata.json','w').write(json.dumps(meta, indent=2))
print('Wrote forecast_metadata.json for period', p)
PY
            used=true
          fi
          echo "used=${used}" >> "$GITHUB_OUTPUT"
        env:
          PERIOD: ${{ inputs.period }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install 'numpy<2.0.0' pandas geopandas matplotlib seaborn reportlab dtaidistance scipy

      - name: Generate compute artifacts as-of period
        if: steps.fastpath.outputs.used != 'true'
        env:
          ASOF: ${{ inputs.period }}
          # Use offline mode to avoid flaky UCDP network downloads during backfills
          UCDP_OFFLINE: '1'
          # Speed up by skipping h=12 and pickle artifacts
          SKIP_H12: '1'
          SKIP_PKL: '1'
        run: |
          # Run generator as-of period to produce Hist.csv and forecasts_h6.csv
          python generate_forecasts.py
          # Sanity
          test -f Hist.csv && head -n 1 Hist.csv || true
          test -f forecasts_h6.csv && head -n 1 forecasts_h6.csv || true

      - name: Derive best.from_site.csv
        run: |
          python scripts/generate_best_from_forecasts.py

      - name: Build newsletter images from forecasts
        run: |
          if [ -f scripts/newsletter_images_thomas.py ]; then
            python scripts/newsletter_images_thomas.py
          else
            python scripts/newsletter_images_from_forecasts.py
          fi

      - name: Build newsletter PDF
        run: |
          # Use pdf.py (will prefer best.from_site.csv)
          python pdf.py || true
          ts=$(date -u -d "${{ inputs.period }}-01" +"%B %Y" 2>/dev/null || date -u +"%B %Y")
          if ls Newsletter_*.pdf >/dev/null 2>&1; then
            fn=$(ls -1t Newsletter_*.pdf | head -n1)
            new="Newsletter_${ts}.pdf"
            mv "$fn" "$new" || true
            echo "PDF: $new"
          else
            # Fallback placeholder
            python -c "from reportlab.lib.pagesizes import letter; from reportlab.pdfgen import canvas; from datetime import datetime; ts=datetime.utcnow().strftime('%B %Y'); fn=f'Newsletter_{ts}.pdf'; c=canvas.Canvas(fn,pagesize=letter); c.setFont('Helvetica',20); c.drawString(72,720,f'PaCE Newsletter - {ts}'); c.setFont('Helvetica',12); c.drawString(72,690,'Placeholder PDF (pdf.py failed)'); c.showPage(); c.save(); print(fn)"
          fi

      - name: Commit newsletter artifacts
        run: |
          set -e
          ts=$(date -u -d "${{ inputs.period }}-01" +"%B %Y" 2>/dev/null || date -u +"%B %Y")
          mkdir -p Newsletters
          if ls Newsletter_*.pdf >/dev/null 2>&1; then
            mv Newsletter_*.pdf Newsletters/ || true
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add Newsletters/ assets/ Images/ docs/Images/ || true
          if git diff --cached --quiet; then
            echo "No newsletter changes to commit"
          else
            git commit -m "chore(newsletter): backfill ${{ inputs.period }}"
            git push
          fi

name: Generate Monthly Performance Report

on:
  schedule:
    - cron: '0 2 24 * *'  # 24th at 02:00 UTC
    - cron: '0 2 1 * *'   # 1st at 02:00 UTC
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'numpy<2.0.0' 'pandas>=1.4.0,<2.0.0'
          pip install matplotlib seaborn scikit-learn requests geopandas shapely

      - name: Generate performance report
        working-directory: reports/generator
        run: |
          python report.py

      - name: Commit and push report artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # Stage figures and tables
          git add reports/overleaf/Fig_2025/ 2>/dev/null || true
          git add reports/overleaf/tables/ 2>/dev/null || true
          git add reports/overleaf/meta.tex 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            REPORT_DATE=$(date -u +"%Y-%m")
            git commit -m "chore(report): update performance report for ${REPORT_DATE}"
            git push origin HEAD:main
          fi

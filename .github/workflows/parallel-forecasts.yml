name: Parallel Forecast Generation

on:
  schedule:
    - cron: '0 1 24 * *'  # pre-month run
    - cron: '0 1 1 * *'   # 1st fallback
  workflow_dispatch:

concurrency:
  group: parallel-forecasts
  cancel-in-progress: false

jobs:
  prepare-data:
    runs-on: ubuntu-latest
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install seaborn scikit-learn

      - name: Download and process UCDP data
        env:
          UCDP_API_TOKEN: ${{ secrets.UCDP_API_TOKEN }}
        run: python scripts/parallel/prepare_data.py

      - name: Save processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: |
            Conf.csv
            reg_coun.csv
            shape.py
            generate_forecasts.py
          retention-days: 1

  generate-h6:
    needs: prepare-data
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3, 4, 5, 6, 7]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install seaborn scikit-learn

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: ./

      - name: Generate h=6 forecasts (chunk ${{ matrix.chunk }})
        run: python scripts/parallel/generate_chunk.py 6 ${{ matrix.chunk }} 8
        timeout-minutes: 90

      - name: Upload h6 results
        uses: actions/upload-artifact@v4
        with:
          name: h6-chunk-${{ matrix.chunk }}
          path: |
            forecasts_h6_chunk${{ matrix.chunk }}.csv
            forecasts_h6_min_chunk${{ matrix.chunk }}.csv
            forecasts_h6_max_chunk${{ matrix.chunk }}.csv
            perc_h6_chunk${{ matrix.chunk }}.csv
            dict_m_h6_chunk${{ matrix.chunk }}.pkl
            dict_sce_h6_chunk${{ matrix.chunk }}.pkl
            sce_dictionary_h6_chunk${{ matrix.chunk }}.pkl
          retention-days: 1

  generate-h12:
    needs: prepare-data
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3, 4, 5, 6, 7]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install seaborn scikit-learn

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: ./

      - name: Generate h=12 forecasts (chunk ${{ matrix.chunk }})
        run: python scripts/parallel/generate_chunk.py 12 ${{ matrix.chunk }} 8
        timeout-minutes: 90

      - name: Upload h12 results
        uses: actions/upload-artifact@v4
        with:
          name: h12-chunk-${{ matrix.chunk }}
          path: |
            forecasts_h12_chunk${{ matrix.chunk }}.csv
            forecasts_h12_min_chunk${{ matrix.chunk }}.csv
            forecasts_h12_max_chunk${{ matrix.chunk }}.csv
            perc_h12_chunk${{ matrix.chunk }}.csv
            dict_sce_h12_chunk${{ matrix.chunk }}.pkl
            sce_dictionary_h12_chunk${{ matrix.chunk }}.pkl
          retention-days: 1

  merge-and-publish:
    needs: [generate-h6, generate-h12]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas==1.4.0 numpy==1.22.3

      - name: Download h6 chunks
        uses: actions/download-artifact@v4
        with:
          pattern: h6-chunk-*
          path: h6-chunks/
          merge-multiple: true

      - name: Download h12 chunks
        uses: actions/download-artifact@v4
        with:
          pattern: h12-chunk-*
          path: h12-chunks/
          merge-multiple: true

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/

      - name: Merge h=6 results
        run: python scripts/parallel/merge_results.py 6 8

      - name: Merge h=12 results
        run: python scripts/parallel/merge_results.py 12 8

      - name: Create Hist.csv and metadata
        run: python scripts/parallel/create_metadata.py

      - name: Add 'date' (YYYY-MM) column to forecast CSVs
        run: |
          python - <<'PY'
          import pandas as pd, json
          from datetime import datetime
          try:
              with open('forecast_metadata.json') as f:
                  meta=json.load(f)
              start=datetime.strptime((meta.get('forecast_start_date') or meta.get('data_end_date'))+'-01','%Y-%m-%d')
          except Exception as e:
              start=datetime.utcnow().replace(day=1)
          def yyyymm_add(d,i):
              y=d.year; m=d.month+i
              y+= (m-1)//12; m=((m-1)%12)+1
              return f"{y:04d}-{m:02d}"
          def ensure(fname):
              try:
                  df=pd.read_csv(fname)
              except Exception:
                  return
              if len(df.columns)>0 and str(df.columns[0]).lower()=='date':
                  return
              dates=[yyyymm_add(start,i) for i in range(len(df))]
              df.insert(0,'date',dates)
              df.to_csv(fname,index=False)
          for f in ['forecasts_h6.csv','forecasts_h6_min.csv','forecasts_h6_max.csv','forecasts_h12.csv','forecasts_h12_min.csv','forecasts_h12_max.csv','Pred_df.csv','Pred_df_min.csv','Pred_df_max.csv']:
              ensure(f)
          PY

      - name: Validate forecast coverage vs Hist.csv (last 12 months)
        run: |
          python scripts/validate_coverage.py

      - name: Organize outputs for Historical_Predictions
        run: python scripts/prepare_historical_predictions.py || echo "prepare_historical_predictions.py not found, skipping"
        timeout-minutes: 10

      - name: Commit and push changes
        run: |
          set -e
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add forecasts_h6.csv forecasts_h6_min.csv forecasts_h6_max.csv forecasts_h12.csv forecasts_h12_min.csv forecasts_h12_max.csv Hist.csv forecast_metadata.json Pred_df.csv Pred_df_min.csv Pred_df_max.csv perc.csv saved_dictionary.pkl dict_sce.pkl sce_dictionary.pkl dict_sce_h12.pkl sce_dictionary_h12.pkl Historical_Predictions/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: generate forecasts for $(date +%Y-%m) (parallel)

          - h=6 and h=12 forecasts generated with 16 parallel workers (8 chunks each)
          - Runtime: ~30-45 minutes vs 5-6 hours sequential

          🤖 Auto-generated by GitHub Actions (parallel workflow)"
          # Rebase on latest main to avoid non-fast-forward push failures
          git fetch origin main
          if ! git pull --rebase origin main; then
            echo "Rebase failed; aborting rebase and skipping push to avoid conflicts." >&2
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:main

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pace-forecasts-${{ github.run_number }}
          path: |
            forecasts_h*.csv
            Hist.csv
            forecast_metadata.json
          retention-days: 90

      - name: Create summary
        run: |
          echo "## 📊 Parallel Forecast Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Generated forecasts for $(date +%Y-%m)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Parallelization" >> $GITHUB_STEP_SUMMARY
          echo "- 8 parallel workers (4 for h=6, 4 for h=12)" >> $GITHUB_STEP_SUMMARY
          echo "- Expected runtime: ~1-1.5 hours vs 5-6 hours sequential" >> $GITHUB_STEP_SUMMARY
      - name: Success email
        if: ${{ success() && env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.MAIL_TO != '' && env.MAIL_FROM != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT || 465 }}
          secure: ${{ env.SMTP_SECURE == 'true' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "✅ Forecast generation succeeded: ${{ github.repository }}#${{ github.run_number }}"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          content_type: text/html
          html_body: |
            <p><strong>Parallel Forecast Generation</strong> completed successfully.</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>
      - name: Failure email
        if: ${{ failure() && env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.MAIL_TO != '' && env.MAIL_FROM != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT || 465 }}
          secure: ${{ env.SMTP_SECURE == 'true' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "❌ Forecast generation FAILED: ${{ github.repository }}#${{ github.run_number }}"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          content_type: text/html
          html_body: |
            <p><strong>Parallel Forecast Generation</strong> failed.</p>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View run</a></p>

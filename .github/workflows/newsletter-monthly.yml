name: Generate Monthly Newsletter

on:
  schedule:
    - cron: '0 2 24 * *' # 24th at 02:00 UTC
    - cron: '0 2 1 * *'  # 1st at 02:00 UTC
  workflow_dispatch: {}

jobs:
  newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies for PDF processing
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install PDF deps
        run: |
          python -m pip install --upgrade pip
          # Install numpy first to avoid version conflicts
          pip install 'numpy<2.0.0'
          if [ -f requirements_pdf.txt ]; then
            pip install -r requirements_pdf.txt
          else
            # Fix numpy/pandas compatibility issue by installing compatible versions
            pip install 'pandas>=1.4.0,<2.0.0' reportlab weasyprint geopandas matplotlib seaborn || true
          fi

      - name: Install image deps (matplotlib/seaborn + DTW/cluster)
        run: |
          pip install matplotlib seaborn dtaidistance scipy

      - name: Wait for compute run (forecast_metadata fresh)
        env:
          REPO: conflictlab/Pace-map-risk
        run: |
          set -e
          ATTEMPTS=18 # up to ~90 minutes
          URL="https://raw.githubusercontent.com/${REPO}/main/forecast_metadata.json"
          for i in $(seq 1 $ATTEMPTS); do
            code=$(curl -s -o /tmp/forecast_meta.json -w '%{http_code}' "$URL" || true)
            if [ "$code" = "200" ]; then
              run_date=$(jq -r '.run_date // ""' /tmp/forecast_meta.json 2>/dev/null || echo "")
              if [ -n "$run_date" ] && [ "$run_date" != "null" ]; then
                clean_date=$(echo "$run_date" | sed 's/\.[0-9]*$//')
                ts=$(date -d "$clean_date" +%s 2>/dev/null || echo "")
                if [ -n "$ts" ]; then
                  now=$(date -u +%s)
                  age_min=$(( (now - ts) / 60 ))
                else
                  age_min=999999
                fi
              else
                age_min=999999
              fi
            else
              age_min=999999
            fi
            if [ "$age_min" -le 480 ]; then echo "Compute fresh (age ${age_min} min)."; break; fi
            echo "Waiting for compute (attempt $i/$ATTEMPTS) — current age ${age_min} min"; sleep 300
          done

      - name: Download compute artifacts (Hist, forecasts, pickles)
        env:
          REPO: conflictlab/Pace-map-risk
        run: |
          set -e
          base="https://raw.githubusercontent.com/${REPO}/main"
          for f in Hist.csv forecasts_h6.csv saved_dictionary.pkl sce_dictionary.pkl; do
            echo "Fetching $f ...";
            curl -fsSL "$base/$f" -o "$f";
          done

      - name: Generate best.from_site.csv from forecasts (align selection)
        run: |
          if [ -f scripts/generate_best_from_forecasts.py ]; then
            python scripts/generate_best_from_forecasts.py
          fi

      - name: Build newsletter images from forecasts (aligned with dashboard)
        run: |
          # Try to fetch scenario/match pickles (optional)
          # Prefer compute artifacts downloaded above; if missing, fallback to remote
          if [ ! -f sce_dictionary.pkl ]; then curl -fsSL https://raw.githubusercontent.com/conflictlab/Pace-map-risk/main/sce_dictionary.pkl -o sce_dictionary.pkl || true; fi
          if [ ! -f saved_dictionary.pkl ]; then curl -fsSL https://raw.githubusercontent.com/conflictlab/Pace-map-risk/main/saved_dictionary.pkl -o saved_dictionary.pkl || true; fi
          if [ -f scripts/newsletter_images_thomas.py ]; then
            python scripts/newsletter_images_thomas.py
          elif [ -f scripts/newsletter_images_from_forecasts.py ]; then
            python scripts/newsletter_images_from_forecasts.py
          else
            echo "No newsletter image generator found" >&2; exit 1
          fi

      - name: Build newsletter PDF
        run: |
          ts=$(date -u +"%B %Y")
          out_name="Newsletter_${ts}.pdf"
          if [ -f pdf.py ]; then
            python pdf.py || true
          fi
          # If pdf.py didn't produce a file, fallback: convert HTML to placeholder PDF
          if [ ! -f "$out_name" ]; then
            python -c "from reportlab.lib.pagesizes import letter; from reportlab.pdfgen import canvas; from datetime import datetime; ts=datetime.utcnow().strftime('%B %Y'); fn=f\"Newsletter_{ts}.pdf\"; c=canvas.Canvas(fn,pagesize=letter); c.setFont('Helvetica',20); c.drawString(72,720,f\"PaCE Newsletter - {ts}\"); c.setFont('Helvetica',12); c.drawString(72,690,'Placeholder PDF generated by CI (update pdf.py for full content)'); c.showPage(); c.save(); print(fn)"
          fi
          ls -la Newsletter_*.pdf || true

      - name: Install HTML conversion deps
        run: |
          if [ -f requirements_html.txt ]; then
            pip install -r requirements_html.txt
          else
            pip install pdf2image || true
          fi

      - name: Build newsletter HTML
        run: |
          if [ -f newsletter.py ]; then
            echo "Converting Report.pdf to HTML..."
            python newsletter.py
            echo "HTML generated at assets/html_output/output.html"
          else
            echo "newsletter.py not found; skipping HTML generation" >&2
          fi

      - name: Publish newsletter without rebase (worktree)
        run: |
          set -euo pipefail
          ts=$(date -u +"%B %Y")
          out_name="Newsletter_${ts}.pdf"
          mkdir -p Newsletters
          if ls Newsletter_*.pdf >/dev/null 2>&1; then
            mv Newsletter_*.pdf Newsletters/ || true
          fi

          # Prepare a clean worktree at origin/main to avoid any merge/rebase on binaries
          git fetch origin main
          WRK="${{ runner.temp }}/nwsl-worktree"
          rm -rf "$WRK" || true
          git worktree add "$WRK" origin/main

          changed=0
          # Copy generated artifacts into the clean worktree
          if [ -f assets/Report.pdf ]; then
            mkdir -p "$WRK/assets"
            cp -f assets/Report.pdf "$WRK/assets/Report.pdf"; changed=1
          fi
          if ls Newsletters/*.pdf >/dev/null 2>&1; then
            mkdir -p "$WRK/Newsletters"
            # Preserve filename with spaces
            find Newsletters -maxdepth 1 -name '*.pdf' -print0 | xargs -0 -I{} cp -f "{}" "$WRK/Newsletters/"; changed=1
          fi
          if [ -d assets/html_output/_pdf_images ]; then
            mkdir -p "$WRK/assets/html_output"
            rm -rf "$WRK/assets/html_output/_pdf_images" || true
            cp -R assets/html_output/_pdf_images "$WRK/assets/html_output/"; changed=1
          fi
          # Optionally copy rendered HTML output if produced
          if [ -f assets/html_output/output.html ]; then
            mkdir -p "$WRK/assets/html_output"
            cp -f assets/html_output/output.html "$WRK/assets/html_output/output.html" || true
          fi

          if [ "$changed" -eq 0 ]; then
            echo "No newsletter artifacts to publish"; git worktree remove "$WRK" --force; exit 0
          fi

          pushd "$WRK" >/dev/null
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add assets/Report.pdf 2>/dev/null || true
          git add assets/html_output/_pdf_images 2>/dev/null || true
          git add assets/html_output/output.html 2>/dev/null || true
          git add Newsletters/*.pdf 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes in clean worktree; nothing to commit"
          else
            git commit -m "chore(newsletter): publish $ts newsletter (PDF/HTML)"
            git push origin HEAD:main
          fi
          popd >/dev/null
          git worktree remove "$WRK" --force

name: Generate Monthly Forecasts

on:
  schedule:
    # Run on the 1st of every month at 1:00 AM UTC (before website sync)
    - cron: '0 1 1 * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy geopandas matplotlib seaborn shapely scipy scikit-learn pillow
          pip install dtaidistance
          pip install -r requirements.txt || true

      - name: Generate forecasts
        run: |
          python generate_forecasts.py
        timeout-minutes: 60

      - name: Organize outputs for Historical_Predictions
        run: |
          python scripts/prepare_historical_predictions.py
        timeout-minutes: 10

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add \
            forecasts_h6.csv forecasts_h6_min.csv forecasts_h6_max.csv \
            forecasts_h12.csv forecasts_h12_min.csv forecasts_h12_max.csv \
            Hist.csv forecast_metadata.json \
            Pred_df.csv Pred_df_min.csv Pred_df_max.csv \
            perc.csv dec.csv sta.csv inc.csv \
            perc_h12.csv dec_h12.csv sta_h12.csv inc_h12.csv \
            saved_dictionary.pkl dict_sce.pkl sce_dictionary.pkl \
            dict_sce_h12.pkl sce_dictionary_h12.pkl \
            Historical_Predictions/ \
            Conf.csv || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): sync forecasts to $(date +%Y-%m) and mirror raw CSV

          - Generated h=6 and h=12 month forecasts
          - Updated Historical_Predictions directory
          - Extended historical data

          🤖 Auto-generated by GitHub Actions"

            git push
          fi

      - name: Upload forecast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pace-forecasts-${{ github.run_number }}
          path: |
            forecasts_h*.csv
            Hist.csv
            forecast_metadata.json
            Historical_Predictions/
          retention-days: 90

      - name: Create summary
        run: |
          echo "## 📊 PACE Forecast Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Generated forecasts for $(date +%Y-%m)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Files" >> $GITHUB_STEP_SUMMARY
          echo "- \`forecasts_h6.csv\` - 6-month ahead forecasts" >> $GITHUB_STEP_SUMMARY
          echo "- \`forecasts_h12.csv\` - 12-month ahead forecasts" >> $GITHUB_STEP_SUMMARY
          echo "- \`Hist.csv\` - Full historical time series" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "The website sync workflow will automatically pick up these changes within 24 hours." >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `⚠️ Monthly Forecast Generation Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `The automated monthly forecast generation workflow has failed.

            **Workflow Run:** ${runUrl}
            **Triggered:** ${context.eventName}
            **Date:** ${new Date().toISOString()}

            ## Next Steps
            1. Check the [workflow logs](${runUrl}) for error details
            2. Common issues:
               - UCDP data source temporarily unavailable
               - Missing dependencies
               - Memory or timeout issues
            3. You can manually re-run the workflow from the Actions tab
            4. If the issue persists, check the [FORECAST_GENERATION.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/FORECAST_GENERATION.md) documentation

            This issue will be automatically closed when the next run succeeds.`;

            // Check if there's already an open issue for this
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-forecast-failure',
              per_page: 1
            });

            if (issues.data.length === 0) {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['automated-forecast-failure', 'bug']
              });
            } else {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Another failure occurred.\n\n${body}`
              });
            }

      - name: Close failure issues on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-forecast-failure',
              per_page: 100
            });

            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: '✅ Monthly forecast generation succeeded. Closing this issue automatically.'
              });
            }
